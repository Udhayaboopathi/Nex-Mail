# Hostname: change mail.sudoinnovation.tech to match DOMAIN in .env (your public mail URL).
http:
  routers:
    backend-api:
      # PathPrefix(`/health`) so /health and /health/ready both hit FastAPI — not Next.js.
      rule: "Host(`mail.sudoinnovation.tech`) && (PathPrefix(`/health`) || PathPrefix(`/api`))"
      entryPoints:
        - websecure
      service: backend-api-svc
      priority: 100
      tls: {}

    frontend-web:
      # Exclude API and health prefixes so they never hit Next even if priorities change.
      rule: "Host(`mail.sudoinnovation.tech`) && !PathPrefix(`/api`) && !PathPrefix(`/health`)"
      entryPoints:
        - websecure
      service: frontend-web-svc
      priority: 1
      tls: {}

  serversTransports:
    backend-timeout:
      forwardingTimeouts:
        dialTimeout: 10s
        responseHeaderTimeout: 120s
        idleConnTimeout: 120s

  services:
    backend-api-svc:
      serversTransport: backend-timeout
      loadBalancer:
        servers:
          - url: "http://backend:8000"

    frontend-web-svc:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"

services:
  traefik:
    image: traefik:v3.7.0
    restart: unless-stopped
    command: --providers.file.directory=/etc/traefik/dynamic --providers.file.watch=true
    env_file: .env
    ports: ["80:80","443:443"]
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/acme:/acme
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks: [traefik-public]
  backend:
    build: ./backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    env_file: .env
    environment:
      - PYTHONPATH=/app
    ports: ["25:25","587:587","993:993"]
    volumes:
      - ./infra/mail-certs:/etc/ssl/mail:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # HTTP → HTTPS redirect handled by Traefik entryPoint redirect
      # HTTPS router for /api
      - "traefik.http.routers.backend-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend-api.entrypoints=websecure"
      - "traefik.http.routers.backend-api.tls=true"
      - "traefik.http.routers.backend-api.priority=100"
      - "traefik.http.routers.backend-api.service=backend-svc"
      # HTTPS router for /health
      - "traefik.http.routers.backend-health.rule=Path(`/health`)"
      - "traefik.http.routers.backend-health.entrypoints=websecure"
      - "traefik.http.routers.backend-health.tls=true"
      - "traefik.http.routers.backend-health.priority=100"
      - "traefik.http.routers.backend-health.service=backend-svc"
      - "traefik.http.services.backend-svc.loadbalancer.server.port=8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [traefik-public, internal]
  frontend:
    build: ./frontend
    restart: unless-stopped
    healthcheck: { test: ["CMD-SHELL","node -e \"process.exit(0)\""], interval: 30s, timeout: 5s, retries: 3 }
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`) && !PathPrefix(`/api`) && !PathPrefix(`/health`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks: [traefik-public]
  postgres:
    image: postgres:18
    restart: unless-stopped
    healthcheck: { test: ["CMD-SHELL","pg_isready -U $$POSTGRES_USER"], interval: 30s, timeout: 5s, retries: 3 }
    env_file: .env
    networks: [internal]
  redis:
    image: valkey/valkey:8.1.6-alpine
    restart: unless-stopped
    healthcheck: { test: ["CMD","valkey-cli","ping"], interval: 30s, timeout: 5s, retries: 3 }
    networks: [internal]
  spamassassin:
    build: ./infra/spamassassin
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "spamc -R < /dev/null 2>&1 | grep -q 'spam' || exit 0"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks: [internal]
  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    healthcheck: { test: ["CMD-SHELL","echo ok"], interval: 30s, timeout: 5s, retries: 3 }
    networks: [internal]
  worker:
    build: ./backend
    command: celery -A backend.tasks.celery_app.celery_app worker -Q default,email,backup,ai -l info
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONPATH=/app
    healthcheck: { test: ["CMD-SHELL","python -c 'print(1)'"], interval: 30s, timeout: 5s, retries: 3 }
    networks: [internal]
  beat:
    build: ./backend
    command: celery -A backend.tasks.celery_app.celery_app beat -l info --scheduler celery.beat:PersistentScheduler
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONPATH=/app
    healthcheck: { test: ["CMD-SHELL","python -c 'print(1)'"], interval: 30s, timeout: 5s, retries: 3 }
    networks: [internal]
networks:
  traefik-public: {}
  internal: {}
